services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  ciam-api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      CIAM_OLLAMA_URL: http://ollama:11434
      CIAM_OLLAMA_MODEL: nomic-embed-text
      CIAM_DB_PATH: /data/ciam.db
    volumes:
      - ciam_data:/data
    ports:
      - "8080:8080"
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  ciam_data:
